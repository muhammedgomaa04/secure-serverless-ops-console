<!doctype html>
<html lang="ar" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SEC//TASKS — Security Ops Console</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
      rel="stylesheet"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #0a0e14;
        --panel: #10151d;
        --panel-2: #141a24;
        --border: #1e2733;
        --text: #e6ebf2;
        --text-dim: #8794a6;
        --text-faint: #57667a;
        --accent: #22d3ee;
        --accent-soft: rgba(34, 211, 238, 0.12);
        --critical: #f5455c;
        --high: #f9944d;
        --medium: #f0c93d;
        --low: #4fb2e8;
        --success: #2fd681;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(
            ellipse 900px 500px at 15% -10%,
            rgba(34, 211, 238, 0.08),
            transparent 60%
          ),
          var(--bg);
        color: var(--text);
        font-family: "Inter", sans-serif;
        position: relative;
      }
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background-image: repeating-linear-gradient(
          180deg,
          rgba(255, 255, 255, 0.014) 0px,
          rgba(255, 255, 255, 0.014) 1px,
          transparent 1px,
          transparent 3px
        );
        pointer-events: none;
        z-index: 0;
      }
      .mono {
        font-family: "JetBrains Mono", monospace;
      }
      .panel {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 12px;
      }
      .status-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--success);
        animation: pulse 2s infinite;
        flex-shrink: 0;
      }
      @keyframes pulse {
        0% {
          box-shadow: 0 0 0 0 rgba(47, 214, 129, 0.55);
        }
        70% {
          box-shadow: 0 0 0 8px rgba(47, 214, 129, 0);
        }
        100% {
          box-shadow: 0 0 0 0 rgba(47, 214, 129, 0);
        }
      }
      .sev-chip {
        font-family: "JetBrains Mono", monospace;
        font-size: 0.65rem;
        font-weight: 700;
        letter-spacing: 0.05em;
        padding: 0.2rem 0.5rem;
        border-radius: 4px;
        text-transform: uppercase;
        white-space: nowrap;
      }
      .filter-btn {
        font-family: "JetBrains Mono", monospace;
        font-size: 0.7rem;
        padding: 0.4rem 0.75rem;
        border-radius: 6px;
        border: 1px solid var(--border);
        color: var(--text-dim);
        background: transparent;
        transition: all 0.15s;
        cursor: pointer;
        white-space: nowrap;
      }
      .filter-btn:hover {
        border-color: var(--text-faint);
        color: var(--text);
      }
      .filter-btn.active {
        border-color: var(--accent);
        color: var(--accent);
        background: var(--accent-soft);
      }
      .sev-pick {
        flex: 1;
        font-family: "JetBrains Mono", monospace;
        font-size: 0.7rem;
        font-weight: 700;
        letter-spacing: 0.04em;
        padding: 0.5rem 0.25rem;
        border-radius: 8px;
        border: 1px solid var(--border);
        background: var(--panel-2);
        color: var(--text-dim);
        cursor: pointer;
        transition: all 0.15s;
        text-transform: uppercase;
      }
      .sev-pick.active {
        color: #0a0e14;
      }
      .task-row {
        animation: rowIn 0.25s ease both;
      }
      @keyframes rowIn {
        from {
          opacity: 0;
          transform: translateY(4px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .modal-overlay {
        position: fixed;
        inset: 0;
        background: rgba(5, 8, 12, 0.72);
        backdrop-filter: blur(4px);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 50;
        padding: 1rem;
      }
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-thumb {
        background: var(--border);
        border-radius: 4px;
      }
    </style>
  </head>
  <body>
    <!-- ============ LOGIN SCREEN ============ -->
    <div
      id="loginScreen"
      class="relative z-10 min-h-screen flex items-center justify-center p-4"
    >
      <div class="panel p-8 w-full max-w-md">
        <div class="text-center mb-8">
          <div
            class="w-14 h-14 rounded-xl bg-[var(--accent-soft)] border border-[var(--accent)]/30 flex items-center justify-center mx-auto mb-4"
          >
            <i
              class="fa-solid fa-shield-halved text-2xl text-[var(--accent)]"
            ></i>
          </div>
          <h1 class="text-xl font-bold text-white tracking-wide mono">
            SEC<span class="text-[var(--accent)]">//</span>TASKS
          </h1>
          <p class="text-[var(--text-dim)] text-xs mt-2 mono">
            ZERO-TRUST TASK CONSOLE · AWS SERVERLESS
          </p>
        </div>
        <div class="space-y-4">
          <div>
            <label
              class="block text-xs font-medium text-[var(--text-dim)] mb-1 mono"
              >EMAIL</label
            >
            <input
              id="email"
              type="email"
              class="w-full bg-[var(--panel-2)] border border-[var(--border)] rounded-lg px-4 py-2.5 text-white text-sm focus:outline-none focus:border-[var(--accent)] transition"
              placeholder="you@example.com"
            />
          </div>
          <div>
            <label
              class="block text-xs font-medium text-[var(--text-dim)] mb-1 mono"
              >PASSWORD</label
            >
            <input
              id="password"
              type="password"
              class="w-full bg-[var(--panel-2)] border border-[var(--border)] rounded-lg px-4 py-2.5 text-white text-sm focus:outline-none focus:border-[var(--accent)] transition"
              placeholder="••••••••"
            />
          </div>
          <button
            onclick="login()"
            id="loginBtn"
            class="w-full bg-[var(--accent)] hover:opacity-90 text-[#08131a] font-bold text-sm py-2.5 px-4 rounded-lg transition mt-2"
          >
            <i class="fa-solid fa-right-to-bracket mr-2"></i> Authenticate
          </button>
          <p
            id="loginError"
            class="text-[var(--critical)] text-xs text-center hidden mt-2"
          ></p>
        </div>
      </div>
    </div>

    <!-- ============ DASHBOARD ============ -->
    <div
      id="dashboard"
      class="relative z-10 hidden max-w-4xl mx-auto p-4 md:p-8"
    >
      <!-- Header -->
      <div class="flex justify-between items-center mb-6">
        <div class="flex items-center gap-3">
          <div
            class="w-10 h-10 rounded-lg bg-[var(--accent-soft)] border border-[var(--accent)]/30 flex items-center justify-center"
          >
            <i class="fa-solid fa-shield-halved text-[var(--accent)]"></i>
          </div>
          <div>
            <h1 class="text-lg font-bold text-white mono tracking-wide">
              SEC<span class="text-[var(--accent)]">//</span>TASKS
            </h1>
            <div
              class="flex items-center gap-1.5 text-[10px] text-[var(--text-dim)] mono"
            >
              <span class="status-dot"></span> SYSTEM SECURE · KMS ENCRYPTED
            </div>
          </div>
        </div>
        <button
          onclick="logout()"
          class="text-[var(--text-dim)] hover:text-[var(--critical)] transition w-9 h-9 rounded-lg border border-[var(--border)] flex items-center justify-center"
          title="Sign out"
        >
          <i class="fa-solid fa-power-off"></i>
        </button>
      </div>

      <!-- Stats -->
      <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-6">
        <div class="panel p-3">
          <div class="text-[10px] text-[var(--text-dim)] mono mb-1">TOTAL</div>
          <div id="statTotal" class="text-2xl font-bold text-white mono">0</div>
        </div>
        <div class="panel p-3">
          <div class="text-[10px] text-[var(--critical)] mono mb-1">
            CRITICAL
          </div>
          <div id="statCritical" class="text-2xl font-bold text-white mono">
            0
          </div>
        </div>
        <div class="panel p-3">
          <div class="text-[10px] text-[var(--high)] mono mb-1">OVERDUE</div>
          <div id="statOverdue" class="text-2xl font-bold text-white mono">
            0
          </div>
        </div>
        <div class="panel p-3">
          <div class="text-[10px] text-[var(--success)] mono mb-1">
            RESOLVED
          </div>
          <div id="statDone" class="text-2xl font-bold text-white mono">0</div>
        </div>
      </div>

      <!-- Toolbar -->
      <div class="panel p-4 mb-4 space-y-3">
        <div class="flex gap-2">
          <div class="relative flex-1">
            <i
              class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-[var(--text-faint)] text-sm"
            ></i>
            <input
              id="searchInput"
              type="text"
              oninput="setSearch(this.value)"
              placeholder="Search tickets..."
              class="w-full bg-[var(--panel-2)] border border-[var(--border)] rounded-lg pl-9 pr-4 py-2 text-sm text-white focus:outline-none focus:border-[var(--accent)] transition"
            />
          </div>
          <button
            onclick="openModal()"
            class="bg-[var(--accent)] hover:opacity-90 text-[#08131a] font-bold text-sm px-4 rounded-lg transition flex items-center gap-2"
          >
            <i class="fa-solid fa-plus"></i>
            <span class="hidden sm:inline">New</span>
          </button>
        </div>
        <div class="flex flex-wrap gap-2 items-center justify-between">
          <div class="flex gap-1.5" id="statusTabs">
            <button
              class="filter-btn active"
              data-status="all"
              onclick="setStatusFilter('all')"
            >
              ALL
            </button>
            <button
              class="filter-btn"
              data-status="active"
              onclick="setStatusFilter('active')"
            >
              OPEN
            </button>
            <button
              class="filter-btn"
              data-status="completed"
              onclick="setStatusFilter('completed')"
            >
              RESOLVED
            </button>
          </div>
          <div class="flex gap-1.5 flex-wrap" id="sevChips">
            <button
              class="filter-btn active"
              data-sev="all"
              onclick="setSeverityFilter('all')"
            >
              ALL SEV
            </button>
            <button
              class="filter-btn"
              data-sev="critical"
              onclick="setSeverityFilter('critical')"
            >
              CRITICAL
            </button>
            <button
              class="filter-btn"
              data-sev="high"
              onclick="setSeverityFilter('high')"
            >
              HIGH
            </button>
            <button
              class="filter-btn"
              data-sev="medium"
              onclick="setSeverityFilter('medium')"
            >
              MEDIUM
            </button>
            <button
              class="filter-btn"
              data-sev="low"
              onclick="setSeverityFilter('low')"
            >
              LOW
            </button>
          </div>
        </div>
      </div>

      <!-- List -->
      <ul id="todoList" class="space-y-2"></ul>
    </div>

    <!-- ============ ADD/EDIT MODAL ============ -->
    <div id="modalOverlay" class="modal-overlay hidden">
      <div class="panel p-6 w-full max-w-md">
        <div class="flex justify-between items-center mb-5">
          <h3
            id="modalHeading"
            class="text-white font-bold mono text-sm tracking-wide"
          >
            NEW TICKET
          </h3>
          <button
            onclick="closeModal()"
            class="text-[var(--text-dim)] hover:text-white"
          >
            <i class="fa-solid fa-xmark"></i>
          </button>
        </div>
        <div class="space-y-4">
          <div>
            <label
              class="block text-xs font-medium text-[var(--text-dim)] mb-1 mono"
              >TITLE</label
            >
            <input
              id="modalTitleInput"
              type="text"
              placeholder="e.g. Rotate KMS customer key"
              class="w-full bg-[var(--panel-2)] border border-[var(--border)] rounded-lg px-4 py-2.5 text-white text-sm focus:outline-none focus:border-[var(--accent)] transition"
            />
          </div>
          <div>
            <label
              class="block text-xs font-medium text-[var(--text-dim)] mb-2 mono"
              >SEVERITY</label
            >
            <div class="flex gap-2" id="modalSevGroup">
              <button
                type="button"
                class="sev-pick"
                data-sev="low"
                onclick="pickSeverity('low')"
              >
                Low
              </button>
              <button
                type="button"
                class="sev-pick"
                data-sev="medium"
                onclick="pickSeverity('medium')"
              >
                Medium
              </button>
              <button
                type="button"
                class="sev-pick"
                data-sev="high"
                onclick="pickSeverity('high')"
              >
                High
              </button>
              <button
                type="button"
                class="sev-pick"
                data-sev="critical"
                onclick="pickSeverity('critical')"
              >
                Critical
              </button>
            </div>
          </div>
          <div>
            <label
              class="block text-xs font-medium text-[var(--text-dim)] mb-1 mono"
              >DUE DATE
              <span class="text-[var(--text-faint)]">(optional)</span></label
            >
            <input
              id="modalDueDate"
              type="date"
              class="w-full bg-[var(--panel-2)] border border-[var(--border)] rounded-lg px-4 py-2.5 text-white text-sm focus:outline-none focus:border-[var(--accent)] transition"
            />
          </div>
          <p id="modalError" class="text-[var(--critical)] text-xs hidden"></p>
          <div class="flex gap-2 pt-2">
            <button
              onclick="closeModal()"
              class="flex-1 border border-[var(--border)] text-[var(--text-dim)] hover:text-white text-sm font-medium py-2.5 rounded-lg transition"
            >
              Cancel
            </button>
            <button
              id="modalSaveBtn"
              onclick="submitModal()"
              class="flex-1 bg-[var(--accent)] hover:opacity-90 text-[#08131a] font-bold text-sm py-2.5 rounded-lg transition"
            >
              Save
            </button>
          </div>
        </div>
      </div>
    </div>

    <script>
      // ===== AWS config — Environment Placeholders =====
      const CLIENT_ID = "YOUR_AWS_COGNITO_CLIENT_ID";
      const REGION = "YOUR_AWS_REGION";
      const API_URL =
        "https://YOUR_API_GATEWAY_ID.execute-api.YOUR_REGION.amazonaws.com/todos";

      let idToken = "";
      let allTodos = [];
      let editingTodoId = null;
      let selectedSeverity = "medium";
      const filters = { status: "all", severity: "all", search: "" };

      const SEV_META = {
        critical: { label: "Critical", color: "var(--critical)" },
        high: { label: "High", color: "var(--high)" },
        medium: { label: "Medium", color: "var(--medium)" },
        low: { label: "Low", color: "var(--low)" },
      };
      const SEV_RANK = { critical: 4, high: 3, medium: 2, low: 1 };

      function todayStr() {
        return new Date().toISOString().slice(0, 10);
      }

      // ===== Auth =====
      async function login() {
        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;
        const btn = document.getElementById("loginBtn");
        const errorText = document.getElementById("loginError");

        btn.innerHTML =
          '<i class="fa-solid fa-spinner fa-spin"></i> Authenticating...';
        errorText.classList.add("hidden");

        try {
          const response = await fetch(
            `https://cognito-idp.${REGION}.amazonaws.com/`,
            {
              method: "POST",
              headers: {
                "Content-Type": "application/x-amz-json-1.1",
                "X-Amz-Target":
                  "AWSCognitoIdentityProviderService.InitiateAuth",
              },
              body: JSON.stringify({
                AuthFlow: "USER_PASSWORD_AUTH",
                ClientId: CLIENT_ID,
                AuthParameters: { USERNAME: email, PASSWORD: password },
              }),
            },
          );

          const data = await response.json();

          if (data.AuthenticationResult && data.AuthenticationResult.IdToken) {
            idToken = data.AuthenticationResult.IdToken;
            document.getElementById("loginScreen").classList.add("hidden");
            document.getElementById("dashboard").classList.remove("hidden");
            await fetchTodos();
          } else {
            throw new Error(data.message || "Authentication failed");
          }
        } catch (err) {
          errorText.innerText = err.message;
          errorText.classList.remove("hidden");
        } finally {
          btn.innerHTML =
            '<i class="fa-solid fa-right-to-bracket mr-2"></i> Authenticate';
        }
      }

      function logout() {
        idToken = "";
        allTodos = [];
        document.getElementById("dashboard").classList.add("hidden");
        document.getElementById("loginScreen").classList.remove("hidden");
        document.getElementById("password").value = "";
      }

      // ===== Data =====
      async function fetchTodos() {
        const list = document.getElementById("todoList");
        list.innerHTML =
          '<li class="text-center text-[var(--text-dim)] py-8 mono text-sm"><i class="fa-solid fa-spinner fa-spin mr-2"></i>Decrypting data...</li>';

        try {
          const response = await fetch(API_URL, {
            method: "GET",
            headers: { Authorization: `Bearer ${idToken}` },
          });
          const data = await response.json();
          allTodos = Array.isArray(data) ? data : [];
          renderAll();
        } catch (err) {
          list.innerHTML = `<li class="text-center text-[var(--critical)] text-sm py-8 mono">Couldn't reach the API. Check your connection and try again.</li>`;
        }
      }

      function renderAll() {
        updateStats();
        renderList();
      }

      function updateStats() {
        const total = allTodos.length;
        const critical = allTodos.filter(
          (t) => t.severity === "critical" && !t.completed,
        ).length;
        const overdue = allTodos.filter((t) => isOverdue(t)).length;
        const done = allTodos.filter((t) => t.completed).length;
        document.getElementById("statTotal").innerText = total;
        document.getElementById("statCritical").innerText = critical;
        document.getElementById("statOverdue").innerText = overdue;
        document.getElementById("statDone").innerText = done;
      }

      function isOverdue(todo) {
        return !!todo.dueDate && !todo.completed && todo.dueDate < todayStr();
      }

      function getFiltered() {
        return allTodos
          .filter((t) => {
            if (filters.status === "active" && t.completed) return false;
            if (filters.status === "completed" && !t.completed) return false;
            if (
              filters.severity !== "all" &&
              (t.severity || "medium") !== filters.severity
            )
              return false;
            if (
              filters.search &&
              !t.title.toLowerCase().includes(filters.search.toLowerCase())
            )
              return false;
            return true;
          })
          .sort((a, b) => {
            if (a.completed !== b.completed) return a.completed ? 1 : -1;
            const rankDiff =
              (SEV_RANK[b.severity] || 2) - (SEV_RANK[a.severity] || 2);
            if (rankDiff !== 0) return rankDiff;
            if (a.dueDate && b.dueDate) return a.dueDate < b.dueDate ? -1 : 1;
            if (a.dueDate) return -1;
            if (b.dueDate) return 1;
            return 0;
          });
      }

      function renderList() {
        const list = document.getElementById("todoList");
        const items = getFiltered();
        list.innerHTML = "";

        if (items.length === 0) {
          const empty = document.createElement("li");
          empty.className =
            "text-center text-[var(--text-dim)] text-sm py-10 mono";
          empty.innerText =
            allTodos.length === 0
              ? "No tickets open — clear board."
              : "No tickets match this filter.";
          list.appendChild(empty);
          return;
        }

        items.forEach((todo) => list.appendChild(buildRow(todo)));
      }

      function buildRow(todo) {
        const sev = SEV_META[todo.severity] || SEV_META.medium;
        const overdue = isOverdue(todo);

        const li = document.createElement("li");
        li.className = "task-row panel p-3.5 flex items-center gap-3";
        li.style.borderLeft = `3px solid ${sev.color}`;
        if (todo.completed) li.style.opacity = "0.6";

        // Checkbox
        const checkBtn = document.createElement("button");
        checkBtn.className = "text-lg flex-shrink-0 transition";
        checkBtn.style.color = todo.completed
          ? "var(--success)"
          : "var(--text-faint)";
        checkBtn.innerHTML = todo.completed
          ? '<i class="fa-solid fa-circle-check"></i>'
          : '<i class="fa-regular fa-circle"></i>';
        checkBtn.onclick = () => toggleStatus(todo);

        // Body
        const body = document.createElement("div");
        body.className = "flex-1 min-w-0";

        const titleRow = document.createElement("div");
        titleRow.className = "flex items-center gap-2 flex-wrap";

        const titleEl = document.createElement("span");
        titleEl.className =
          "text-sm text-[var(--text)]" +
          (todo.completed ? " line-through text-[var(--text-dim)]" : "");
        titleEl.innerText = todo.title;

        const chip = document.createElement("span");
        chip.className = "sev-chip";
        chip.style.color = sev.color;
        chip.style.background = sev.color + "1a";
        chip.innerText = sev.label;

        titleRow.appendChild(chip);
        titleRow.appendChild(titleEl);
        body.appendChild(titleRow);

        if (todo.dueDate) {
          const dueEl = document.createElement("div");
          dueEl.className =
            "text-[11px] mono mt-1 " +
            (overdue ? "text-[var(--critical)]" : "text-[var(--text-faint)]");
          dueEl.innerHTML =
            (overdue
              ? '<i class="fa-solid fa-triangle-exclamation mr-1"></i>OVERDUE · '
              : "") + todo.dueDate;
          body.appendChild(dueEl);
        }

        // Actions
        const actions = document.createElement("div");
        actions.className =
          "flex gap-3 text-sm text-[var(--text-dim)] flex-shrink-0";

        const editBtn = document.createElement("button");
        editBtn.className = "hover:text-[var(--accent)] transition";
        editBtn.innerHTML = '<i class="fa-solid fa-pen-to-square"></i>';
        editBtn.onclick = () => openModal(todo);

        const delBtn = document.createElement("button");
        delBtn.className = "hover:text-[var(--critical)] transition";
        delBtn.innerHTML = '<i class="fa-solid fa-trash-can"></i>';
        delBtn.onclick = () => deleteTask(todo.todoId); // تم التعديل لتمرير الـ id الصريح والآمن

        actions.appendChild(editBtn);
        actions.appendChild(delBtn);

        li.appendChild(checkBtn);
        li.appendChild(body);
        li.appendChild(actions);
        return li;
      }

      // ===== Filters =====
      function setStatusFilter(status) {
        filters.status = status;
        document.querySelectorAll("#statusTabs .filter-btn").forEach((b) => {
          b.classList.toggle("active", b.dataset.status === status);
        });
        renderList();
      }

      function setSeverityFilter(sev) {
        filters.severity = sev;
        document.querySelectorAll("#sevChips .filter-btn").forEach((b) => {
          b.classList.toggle("active", b.dataset.sev === sev);
        });
        renderList();
      }

      function setSearch(value) {
        filters.search = value;
        renderList();
      }

      // ===== Modal (add/edit) =====
      function pickSeverity(sev) {
        selectedSeverity = sev;
        document.querySelectorAll("#modalSevGroup .sev-pick").forEach((b) => {
          const active = b.dataset.sev === sev;
          b.classList.toggle("active", active);
          b.style.background = active ? SEV_META[sev].color : "var(--panel-2)";
          b.style.borderColor = active ? SEV_META[sev].color : "var(--border)";
          b.style.color = active ? "#0a0e14" : "var(--text-dim)";
        });
      }

      function openModal(todo) {
        editingTodoId = todo ? todo.todoId : null;
        document.getElementById("modalHeading").innerText = todo
          ? "EDIT TICKET"
          : "NEW TICKET";
        document.getElementById("modalTitleInput").value = todo
          ? todo.title
          : "";
        document.getElementById("modalDueDate").value =
          todo && todo.dueDate ? todo.dueDate : "";
        document.getElementById("modalError").classList.add("hidden");
        pickSeverity(todo && todo.severity ? todo.severity : "medium");
        document.getElementById("modalOverlay").classList.remove("hidden");
        document.getElementById("modalTitleInput").focus();
      }

      function closeModal() {
        document.getElementById("modalOverlay").classList.add("hidden");
        editingTodoId = null;
      }

      async function submitModal() {
        const title = document.getElementById("modalTitleInput").value.trim();
        const dueDate = document.getElementById("modalDueDate").value || null;
        const errorEl = document.getElementById("modalError");
        const saveBtn = document.getElementById("modalSaveBtn");

        if (!title) {
          errorEl.innerText = "Title can't be empty.";
          errorEl.classList.remove("hidden");
          return;
        }

        saveBtn.disabled = true;
        saveBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>';

        try {
          if (editingTodoId) {
            const existing = allTodos.find((t) => t.todoId === editingTodoId);
            await fetch(`${API_URL}/${editingTodoId}`, {
              method: "PUT",
              headers: {
                Authorization: `Bearer ${idToken}`,
                "Content-Type": "application/json",
              },
              body: JSON.stringify({
                title,
                severity: selectedSeverity,
                dueDate,
                completed: existing ? existing.completed : false,
              }),
            });
          } else {
            await fetch(API_URL, {
              method: "POST",
              headers: {
                Authorization: `Bearer ${idToken}`,
                "Content-Type": "application/json",
              },
              body: JSON.stringify({
                title,
                severity: selectedSeverity,
                dueDate,
              }),
            });
          }
          closeModal();
          await fetchTodos();
        } catch (err) {
          errorEl.innerText = "Couldn't save. Try again.";
          errorEl.classList.remove("hidden");
        } finally {
          saveBtn.disabled = false;
          saveBtn.innerHTML = "Save";
        }
      }

      // ===== Actions =====
      async function toggleStatus(todo) {
        try {
          await fetch(`${API_URL}/${todo.todoId}`, {
            method: "PUT",
            headers: {
              Authorization: `Bearer ${idToken}`,
              "Content-Type": "application/json",
            },
            body: JSON.stringify({ completed: !todo.completed }),
          });
          await fetchTodos();
        } catch (err) {
          alert("Couldn't update this ticket: " + err.message);
        }
      }

      async function deleteTask(id) {
        if (!confirm(`Delete this ticket? This can't be undone.`)) return;
        try {
          await fetch(`${API_URL}/${id}`, {
            method: "DELETE",
            headers: { Authorization: `Bearer ${idToken}` },
          });
          await fetchTodos();
        } catch (err) {
          alert("Couldn't delete this ticket: " + err.message);
        }
      }

      document.getElementById("modalOverlay").addEventListener("click", (e) => {
        if (e.target.id === "modalOverlay") closeModal();
      });
      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") closeModal();
      });
    </script>
  </body>
</html>
